<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>학습 플래너</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root{
  --paper:#EDEFF3;
  --panel:#FFFFFF;
  --ink:#16233F;
  --ink-soft:#5C6B85;
  --line:#D7DCE3;
  --teal:#1F8A8A;
  --teal-soft:#E4F1F1;
  --coral:#E2583C;
  --gold:#C9A227;
  --indigo:#4A5FBF;
  --sage:#6B8F71;
  --plum:#8B5FBF;
  --slate:#5C6B7A;
  --rust:#B5533C;
  --radius:10px;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--paper);
  color:var(--ink);
  font-family:'IBM Plex Sans KR', sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{
  max-width:1180px;
  margin:0 auto;
  padding:28px 20px 60px;
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:20px;
  margin-bottom:26px;
  flex-wrap:wrap;
}
.brand h1{
  font-family:'Space Grotesk', sans-serif;
  font-size:28px;
  font-weight:700;
  margin:0 0 4px;
  letter-spacing:-0.01em;
}
.brand .sub{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  color:var(--ink-soft);
  letter-spacing:0.04em;
}
.brand .today{
  font-family:'IBM Plex Mono', monospace;
  font-size:13px;
  color:var(--ink);
  margin-top:8px;
  background:var(--teal-soft);
  display:inline-block;
  padding:3px 10px;
  border-radius:5px;
  letter-spacing:0.02em;
}
.dday-card{
  background:var(--ink);
  color:#fff;
  border-radius:var(--radius);
  padding:14px 20px;
  display:flex;
  align-items:center;
  gap:16px;
  min-width:260px;
}
.dday-card .num{
  font-family:'Space Grotesk', sans-serif;
  font-size:32px;
  font-weight:700;
  line-height:1;
}
.dday-card .num span{font-size:15px; font-weight:500; margin-left:2px;}
.dday-meta{display:flex; flex-direction:column; gap:2px;}
.dday-meta .label{font-size:13px; color:#C9D2E8;}
.dday-meta input{
  background:transparent;
  border:none;
  border-bottom:1px dashed rgba(255,255,255,0.35);
  color:#fff;
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  padding:2px 0;
  width:150px;
}
.dday-meta input::placeholder{color:rgba(255,255,255,0.5);}

.grid{
  display:grid;
  grid-template-columns:240px 1fr;
  gap:20px;
  align-items:start;
}
@media (max-width:860px){
  .grid{grid-template-columns:1fr;}
}

.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px;
}
.panel h2{
  font-family:'Space Grotesk', sans-serif;
  font-size:14px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:var(--ink-soft);
  margin:0 0 14px;
}

/* subject tiles - periodic-table inspired */
.subject-add{
  display:flex;
  align-items:stretch;
  gap:6px;
  margin-bottom:14px;
}
.subject-add input{
  flex:1;
  min-width:0;
  box-sizing:border-box;
  border:1px solid var(--line);
  border-radius:6px;
  padding:8px 10px;
  font-family:'IBM Plex Sans KR', sans-serif;
  font-size:13px;
}
.subject-add button{
  flex-shrink:0;
  box-sizing:border-box;
  border:none;
  background:var(--teal);
  color:#fff;
  border-radius:6px;
  padding:0 14px;
  font-weight:600;
  cursor:pointer;
  font-size:13px;
  white-space:nowrap;
}
.subject-list{display:flex; flex-wrap:wrap; gap:8px;}
.tile{
  position:relative;
  width:58px;
  height:58px;
  border-radius:8px;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Space Grotesk', sans-serif;
  font-weight:700;
  font-size:15px;
  cursor:pointer;
  user-select:none;
}
.tile .idx{
  position:absolute;
  top:3px;
  left:5px;
  font-size:9px;
  font-family:'IBM Plex Mono', monospace;
  opacity:0.8;
  font-weight:400;
}
.tile .full{
  position:absolute;
  bottom:3px;
  font-size:8px;
  font-family:'IBM Plex Mono', monospace;
  font-weight:400;
  opacity:0.9;
  white-space:nowrap;
  max-width:52px;
  overflow:hidden;
  text-overflow:ellipsis;
}
.tile .del{
  position:absolute;
  top:-6px;
  right:-6px;
  width:16px;
  height:16px;
  border-radius:50%;
  background:var(--coral);
  color:#fff;
  font-size:10px;
  line-height:16px;
  text-align:center;
  display:none;
}
.tile:hover .del{display:block;}
.hint{font-size:11.5px; color:var(--ink-soft); margin-top:12px; line-height:1.5;}

/* cylinder progress */
.cylinder-wrap{
  margin-top:22px;
  padding-top:18px;
  border-top:1px dashed var(--line);
  display:flex;
  align-items:center;
  gap:16px;
}
.cylinder{
  width:36px;
  height:120px;
  border:2px solid var(--ink);
  border-bottom-left-radius:6px;
  border-bottom-right-radius:6px;
  position:relative;
  background:repeating-linear-gradient(
    to bottom,
    transparent 0,
    transparent 14px,
    var(--line) 14px,
    var(--line) 15px
  );
  overflow:hidden;
}
.cylinder .liquid{
  position:absolute;
  bottom:0;
  left:0;
  right:0;
  height:0%;
  background:linear-gradient(to top, var(--teal), #4FB6B6);
  transition:height 0.6s cubic-bezier(.4,1.4,.6,1);
}
.cylinder .liquid::before{
  content:'';
  position:absolute;
  top:-3px;
  left:0;
  right:0;
  height:6px;
  background:#4FB6B6;
  border-radius:50%;
  opacity:0.6;
}
.cyl-meta .pct{
  font-family:'Space Grotesk', sans-serif;
  font-size:24px;
  font-weight:700;
}
.cyl-meta .desc{
  font-size:12px;
  color:var(--ink-soft);
  margin-top:2px;
}

/* timetable */
.timetable-scroll{
  overflow-x:auto;
}
table.tt{
  border-collapse:collapse;
  width:100%;
  min-width:640px;
}
table.tt th{
  font-family:'IBM Plex Mono', monospace;
  font-size:12px;
  font-weight:600;
  color:var(--ink-soft);
  padding:6px 4px;
  border-bottom:1px solid var(--line);
  text-align:center;
}
table.tt td.hourcell{
  font-family:'IBM Plex Mono', monospace;
  font-size:11px;
  color:var(--ink-soft);
  text-align:right;
  padding-right:8px;
  white-space:nowrap;
  border-bottom:1px solid var(--line);
  vertical-align:top;
  padding-top:4px;
}
table.tt td.slot{
  border:1px solid var(--line);
  height:34px;
  min-width:78px;
  cursor:pointer;
  position:relative;
  transition:background 0.15s;
  vertical-align:middle;
  padding:2px 4px;
}
table.tt td.slot:hover{background:var(--teal-soft);}
.slot .note{
  font-size:10.5px;
  font-weight:600;
  color:#fff;
  line-height:1.2;
  overflow:hidden;
  text-overflow:ellipsis;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
}

/* checklist */
.today-panel{margin-top:20px;}

.week-strip{
  display:flex;
  align-items:center;
  gap:6px;
  margin:6px 0 16px;
}
.week-arrow{
  border:1px solid var(--line);
  background:var(--panel);
  color:var(--ink);
  border-radius:6px;
  width:26px;
  height:44px;
  font-size:15px;
  cursor:pointer;
  flex-shrink:0;
}
.week-arrow:hover{background:var(--teal-soft); border-color:var(--teal);}
.week-days{
  flex:1;
  display:grid;
  grid-template-columns:repeat(7, 1fr);
  gap:4px;
}
.day-cell{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  padding:6px 2px;
  border-radius:8px;
  border:1px solid var(--line);
  cursor:pointer;
  background:var(--panel);
}
.day-cell:hover{border-color:var(--teal);}
.day-cell .wd{
  font-size:10px;
  color:var(--ink-soft);
  font-family:'IBM Plex Mono', monospace;
}
.day-cell .dnum{
  font-size:13px;
  font-weight:600;
  font-family:'Space Grotesk', sans-serif;
}
.day-cell .dpct{
  font-size:10px;
  font-family:'IBM Plex Mono', monospace;
  color:var(--ink-soft);
}
.day-cell.is-today{border-color:var(--ink);}
.day-cell.is-selected{
  background:var(--ink);
  border-color:var(--ink);
}
.day-cell.is-selected .wd,
.day-cell.is-selected .dnum,
.day-cell.is-selected .dpct{color:#fff;}
.day-cell.has-full .dpct{color:var(--teal); font-weight:600;}
.day-cell.is-selected.has-full .dpct{color:#8FE0D8;}

.task-add{display:flex; align-items:stretch; gap:6px; margin-bottom:12px;}
.task-add input{
  flex:1;
  min-width:0;
  box-sizing:border-box;
  border:1px solid var(--line);
  border-radius:6px;
  padding:8px 10px;
  font-size:13px;
  font-family:'IBM Plex Sans KR', sans-serif;
}
.task-add button{
  flex-shrink:0;
  box-sizing:border-box;
  border:none;
  background:var(--ink);
  color:#fff;
  border-radius:6px;
  padding:0 14px;
  font-weight:600;
  cursor:pointer;
  font-size:13px;
  white-space:nowrap;
}
.task-item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:8px 4px;
  border-bottom:1px solid var(--line);
}
.task-item:last-child{border-bottom:none;}
.task-item input[type=checkbox]{
  width:17px; height:17px;
  accent-color:var(--teal);
  cursor:pointer;
  flex-shrink:0;
}
.task-item span{
  flex:1;
  font-size:13.5px;
}
.task-item.done span{
  text-decoration:line-through;
  color:var(--ink-soft);
}
.task-item .rm{
  cursor:pointer;
  color:var(--ink-soft);
  font-size:14px;
  padding:2px 6px;
}
.task-item .rm:hover{color:var(--coral);}
.empty{color:var(--ink-soft); font-size:13px; padding:6px 4px;}

/* modal */
.overlay{
  position:fixed; inset:0;
  background:rgba(22,35,63,0.35);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:50;
}
.overlay.show{display:flex;}
.modal{
  background:#fff;
  border-radius:var(--radius);
  padding:20px;
  width:280px;
}
.modal h3{
  font-family:'Space Grotesk', sans-serif;
  font-size:15px;
  margin:0 0 14px;
}
.modal label{
  font-size:12px;
  color:var(--ink-soft);
  display:block;
  margin-bottom:4px;
}
.modal select, .modal input{
  width:100%;
  border:1px solid var(--line);
  border-radius:6px;
  padding:8px 10px;
  font-size:13px;
  margin-bottom:12px;
  font-family:'IBM Plex Sans KR', sans-serif;
}
.modal .row{display:flex; gap:8px;}
.modal button{
  flex:1;
  border:none;
  border-radius:6px;
  padding:9px 0;
  font-weight:600;
  cursor:pointer;
  font-size:13px;
}
.modal .save{background:var(--teal); color:#fff;}
.modal .clear{background:var(--paper); color:var(--ink);}

</style>
</head>
<body>
<div class="wrap">

  <div class="top">
    <div class="brand">
      <h1>학습 플래너</h1>
      <div class="sub">WEEKLY STUDY PLANNER — v1</div>
      <div class="today" id="todayBadge"></div>
    </div>
    <div class="dday-card">
      <div class="num" id="ddayNum">D-­</div>
      <div class="dday-meta">
        <div class="label" id="ddayLabel">목표를 설정하세요</div>
        <input id="ddayTitle" placeholder="예: 수능, 면접, 논술">
        <input id="ddayDate" type="date">
      </div>
    </div>
  </div>

  <div class="grid">
    <!-- left column -->
    <div>
      <div class="panel">
        <h2>과목</h2>
        <div class="subject-add">
          <input id="subjectInput" placeholder="과목 이름" maxlength="10">
          <button onclick="addSubject()">추가</button>
        </div>
        <div class="subject-list" id="subjectList"></div>
        <div class="hint">과목을 추가한 뒤, 오른쪽 시간표 칸을 클릭해 배정하세요. 타일에 마우스를 올리면 삭제할 수 있어요.</div>

        <div class="cylinder-wrap">
          <div class="cylinder"><div class="liquid" id="cylLiquid"></div></div>
          <div class="cyl-meta">
            <div class="pct" id="cylPct">0%</div>
            <div class="desc">오늘 할 일 완료율</div>
          </div>
        </div>
      </div>

      <div class="panel today-panel">
        <h2 id="todayTitle">오늘 할 일</h2>
        <div class="week-strip">
          <button class="week-arrow" onclick="shiftWeek(-1)">‹</button>
          <div class="week-days" id="weekDays"></div>
          <button class="week-arrow" onclick="shiftWeek(1)">›</button>
        </div>
        <div class="task-add">
          <input id="taskInput" placeholder="할 일 입력" maxlength="60">
          <button onclick="addTask()">추가</button>
        </div>
        <div id="taskList"></div>
      </div>
    </div>

    <!-- right column -->
    <div class="panel">
      <h2>주간 시간표</h2>
      <div class="timetable-scroll">
        <table class="tt" id="ttTable"></table>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTime"></h3>
    <label>과목</label>
    <select id="modalSubject">
      <option value="">— 없음 —</option>
    </select>
    <label>메모 (선택)</label>
    <input id="modalNote" placeholder="예: 수학 문제집 3단원" maxlength="20">
    <div class="row">
      <button class="clear" onclick="clearSlot()">지우기</button>
      <button class="save" onclick="saveSlot()">저장</button>
    </div>
  </div>
</div>

<script>
const PALETTE = ['#1F8A8A','#E2583C','#C9A227','#4A5FBF','#6B8F71','#8B5FBF','#5C6B7A','#B5533C'];
const DAYS = ['월','화','수','목','금','토','일'];
const START_HOUR = 7, END_HOUR = 23; // slots 07:00 ~ 23:00 (last row 23:00-24:00)

let subjects = [];
let timetable = {};
let ddayInfo = {title:'', date:''};
let currentCellKey = null;

const WEEKDAY_KR = ['일','월','화','수','목','금','토'];

function toKey(d){
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}
function todayKey(){
  return toKey(new Date());
}
function formatDateLabel(key){
  const [y,m,d] = key.split('-').map(Number);
  const dt = new Date(y, m-1, d);
  return `${y}년 ${m}월 ${d}일 (${WEEKDAY_KR[dt.getDay()]})`;
}
function renderTodayBadge(){
  document.getElementById('todayBadge').textContent = '오늘 · ' + formatDateLabel(todayKey());
}

async function loadAll(){
  try{ const r = await window.storage.get('subjects'); subjects = r ? JSON.parse(r.value) : []; }catch(e){ subjects = []; }
  try{ const r = await window.storage.get('timetable'); timetable = r ? JSON.parse(r.value) : {}; }catch(e){ timetable = {}; }
  try{ const r = await window.storage.get('dday'); ddayInfo = r ? JSON.parse(r.value) : {title:'', date:''}; }catch(e){ ddayInfo = {title:'', date:''}; }
  renderSubjects();
  renderTable();
  renderDday();
  try{ await loadTasks(); }catch(e){ console.error('loadTasks failed', e); }
}

async function saveSubjects(){
  try{ await window.storage.set('subjects', JSON.stringify(subjects)); }catch(e){}
}
async function saveTimetable(){
  try{ await window.storage.set('timetable', JSON.stringify(timetable)); }catch(e){}
}
async function saveDday(){
  try{ await window.storage.set('dday', JSON.stringify(ddayInfo)); }catch(e){}
}

function addSubject(){
  const input = document.getElementById('subjectInput');
  const name = input.value.trim();
  if(!name) return;
  const color = PALETTE[subjects.length % PALETTE.length];
  subjects.push({id: Date.now().toString(36), name, color});
  input.value = '';
  saveSubjects();
  renderSubjects();
}

function removeSubject(id){
  subjects = subjects.filter(s => s.id !== id);
  Object.keys(timetable).forEach(k => {
    if(timetable[k] && timetable[k].subjectId === id) delete timetable[k];
  });
  saveSubjects();
  saveTimetable();
  renderSubjects();
  renderTable();
}

function renderSubjects(){
  const list = document.getElementById('subjectList');
  list.innerHTML = '';
  subjects.forEach((s, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.style.background = s.color;
    tile.innerHTML = `
      <span class="idx">${i+1}</span>
      <span>${s.name.slice(0,2)}</span>
      <span class="full">${s.name}</span>
      <span class="del" onclick="removeSubject('${s.id}')">✕</span>
    `;
    list.appendChild(tile);
  });

  const modalSel = document.getElementById('modalSubject');
  modalSel.innerHTML = '<option value="">— 없음 —</option>' +
    subjects.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
}

function renderTable(){
  const table = document.getElementById('ttTable');
  let html = '<tr><th></th>' + DAYS.map(d => `<th>${d}</th>`).join('') + '</tr>';
  for(let h = START_HOUR; h < END_HOUR; h++){
    html += `<tr><td class="hourcell">${String(h).padStart(2,'0')}:00</td>`;
    for(let d = 0; d < 7; d++){
      const key = `${d}-${h}`;
      const cell = timetable[key];
      if(cell && cell.subjectId){
        const subj = subjects.find(s => s.id === cell.subjectId);
        const bg = subj ? subj.color : '#ccc';
        const label = (subj ? subj.name : '') + (cell.note ? ' · ' + cell.note : '');
        html += `<td class="slot" style="background:${bg}" onclick="openSlot('${key}')"><div class="note">${label}</div></td>`;
      } else {
        html += `<td class="slot" onclick="openSlot('${key}')"></td>`;
      }
    }
    html += '</tr>';
  }
  table.innerHTML = html;
}

function openSlot(key){
  currentCellKey = key;
  const [d, h] = key.split('-').map(Number);
  document.getElementById('modalTime').textContent = `${DAYS[d]}요일 ${String(h).padStart(2,'0')}:00`;
  const cell = timetable[key] || {};
  document.getElementById('modalSubject').value = cell.subjectId || '';
  document.getElementById('modalNote').value = cell.note || '';
  document.getElementById('overlay').classList.add('show');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('show');
  currentCellKey = null;
}

function saveSlot(){
  if(!currentCellKey) return;
  const subjectId = document.getElementById('modalSubject').value;
  const note = document.getElementById('modalNote').value.trim();
  if(subjectId){
    timetable[currentCellKey] = {subjectId, note};
  } else {
    delete timetable[currentCellKey];
  }
  saveTimetable();
  renderTable();
  closeModal();
}

function clearSlot(){
  if(!currentCellKey) return;
  delete timetable[currentCellKey];
  saveTimetable();
  renderTable();
  closeModal();
}

document.getElementById('overlay').addEventListener('click', (e) => {
  if(e.target.id === 'overlay') closeModal();
});

// D-day
function renderDday(){
  document.getElementById('ddayTitle').value = ddayInfo.title || '';
  document.getElementById('ddayDate').value = ddayInfo.date || '';
  const numEl = document.getElementById('ddayNum');
  const labelEl = document.getElementById('ddayLabel');
  if(!ddayInfo.date){
    numEl.innerHTML = 'D-­';
    labelEl.textContent = '목표를 설정하세요';
    return;
  }
  const target = new Date(ddayInfo.date + 'T00:00:00');
  const now = new Date();
  now.setHours(0,0,0,0);
  const diff = Math.round((target - now) / 86400000);
  if(diff > 0) numEl.innerHTML = `D-${diff}`;
  else if(diff === 0) numEl.innerHTML = `D-DAY`;
  else numEl.innerHTML = `D+${Math.abs(diff)}`;
  labelEl.textContent = ddayInfo.title || '목표일';
}

document.getElementById('ddayTitle').addEventListener('input', (e) => {
  ddayInfo.title = e.target.value;
  saveDday();
  renderDday();
});
document.getElementById('ddayDate').addEventListener('change', (e) => {
  ddayInfo.date = e.target.value;
  saveDday();
  renderDday();
});

// tasks (per day) + week strip
let tasks = [];
let viewedDate = todayKey();
let weekAnchor = getMonday(new Date());
let taskCache = {}; // dateKey -> tasks array, in-memory source of truth for this session

function getMonday(d){
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}

async function loadTasks(){
  weekAnchor = getMonday(new Date(viewedDate + 'T00:00:00'));
  await loadTasksForDate(viewedDate);
}

async function loadTasksForDate(dateKey){
  viewedDate = dateKey;
  if(taskCache[dateKey] !== undefined){
    tasks = taskCache[dateKey];
  } else {
    const key = 'tasks:' + dateKey;
    let fetched = [];
    try{ const r = await window.storage.get(key); fetched = r ? JSON.parse(r.value) : []; }catch(e){ fetched = []; }
    tasks = fetched;
    taskCache[dateKey] = tasks;
  }
  const isToday = dateKey === todayKey();
  document.getElementById('todayTitle').textContent = isToday ? '오늘 할 일' : formatDateLabel(dateKey) + ' 할 일';
  renderTasks();
  try{ await renderWeek(); }catch(e){ console.error('renderWeek failed', e); }
}

async function saveTasks(){
  taskCache[viewedDate] = tasks;
  const key = 'tasks:' + viewedDate;
  try{ await window.storage.set(key, JSON.stringify(tasks)); }catch(e){ /* in-memory cache still holds the data for this session */ }
  renderWeek();
}

function shiftWeek(delta){
  const oldAnchor = new Date(weekAnchor);
  const [vy, vm, vd] = viewedDate.split('-').map(Number);
  const viewedDt = new Date(vy, vm - 1, vd);
  let offsetDays = Math.round((viewedDt - oldAnchor) / 86400000);
  offsetDays = Math.min(Math.max(offsetDays, 0), 6);

  weekAnchor.setDate(weekAnchor.getDate() + delta * 7);
  const newSelected = new Date(weekAnchor);
  newSelected.setDate(newSelected.getDate() + offsetDays);
  loadTasksForDate(toKey(newSelected));
}

async function renderWeek(){
  const wrap = document.getElementById('weekDays');
  const tKey = todayKey();
  const dates = [];
  for(let i = 0; i < 7; i++){
    const dt = new Date(weekAnchor);
    dt.setDate(dt.getDate() + i);
    dates.push(dt);
  }

  const pcts = {};
  for(const dt of dates){
    const key = toKey(dt);
    let arr;
    if(taskCache[key] !== undefined){
      arr = taskCache[key];
    } else {
      try{
        const r = await window.storage.get('tasks:' + key);
        arr = r ? JSON.parse(r.value) : [];
      }catch(e){
        arr = [];
      }
      taskCache[key] = arr;
    }
    const done = arr.filter(t => t.done).length;
    pcts[key] = arr.length ? Math.round((done / arr.length) * 100) : null;
  }

  wrap.innerHTML = dates.map(dt => {
    const key = toKey(dt);
    const pct = pcts[key];
    const classes = ['day-cell'];
    if(key === tKey) classes.push('is-today');
    if(key === viewedDate) classes.push('is-selected');
    if(pct === 100) classes.push('has-full');
    return `
      <div class="${classes.join(' ')}" onclick="loadTasksForDate('${key}')">
        <span class="wd">${WEEKDAY_KR[dt.getDay()]}</span>
        <span class="dnum">${dt.getDate()}</span>
        <span class="dpct">${pct === null ? '-' : pct + '%'}</span>
      </div>
    `;
  }).join('');
}

function addTask(){
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if(!text) return;
  tasks.push({id: Date.now().toString(36), text, done:false});
  input.value = '';
  saveTasks();
  renderTasks();
}

function toggleTask(id){
  const t = tasks.find(t => t.id === id);
  if(t){ t.done = !t.done; saveTasks(); renderTasks(); }
}
function removeTask(id){
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderTasks();
}

function renderTasks(){
  const list = document.getElementById('taskList');
  if(tasks.length === 0){
    list.innerHTML = '<div class="empty">아직 할 일이 없어요. 위에서 추가해보세요.</div>';
  } else {
    list.innerHTML = tasks.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggleTask('${t.id}')">
        <span>${t.text}</span>
        <span class="rm" onclick="removeTask('${t.id}')">✕</span>
      </div>
    `).join('');
  }
  const done = tasks.filter(t => t.done).length;
  const pct = tasks.length ? Math.round((done / tasks.length) * 100) : 0;
  document.getElementById('cylLiquid').style.height = pct + '%';
  document.getElementById('cylPct').textContent = pct + '%';
}

document.getElementById('taskInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') addTask();
});
document.getElementById('subjectInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter') addSubject();
});

renderTodayBadge();
loadAll();
